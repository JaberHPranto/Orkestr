pre-commit:
  parallel: true
  jobs:
    - name: lint
      glob: '*.{js,jsx,ts,tsx,json,css}'
      exclude: 'src/components/ui/**|.next/**'
      run: npx ultracite fix {staged_files}
      stage_fixed: true
    - name: typecheck
      run: pnpm tsc --noEmit

commit-msg:
  jobs:
    - run: npx commitlint --edit {1}